<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>평생교육·공공기관 강사모집 공고 모음 — 스마트미디어아트센터</title>
  <meta name="description" content="전국 평생학습관·복지관·문화센터·주민센터의 강사모집 공고를 매일 자동으로 모아, 마감이 지난 공고는 걸러서 보여드립니다. 사진/영상/AI/외국어/공예/체육 등 분야별로 찾아보세요." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.smacedu.kr/lecturer-jobs" />
  <meta property="og:title" content="평생교육·공공기관 강사모집 공고 모음 — 스마트미디어아트센터" />
  <meta property="og:description" content="전국 평생학습관·복지관·문화센터의 강사모집 공고를 매일 자동으로 모아, 마감 지난 공고는 걸러서 보여드립니다." />
<style>
  :root {
    --bg: #f7f5ef;
    --surface: #ffffff;
    --surface-tint: #edf0f8;
    --text: #10162b;
    --text-muted: #565f78;
    --navy: #0f1f3d;
    --navy-2: #16294d;
    --gold: #f4b400;
    --gold-ink: #241a00;
    --orange: #ff7a29;
    --line: rgba(16,22,43,0.12);
    --shadow: 0 20px 44px -22px rgba(15,31,61,0.35);
    --font-body: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", -apple-system, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0f1a; --surface: #131a2b; --surface-tint: #182238;
      --text: #f2f3f7; --text-muted: #a7adc0;
      --navy: #0a1220; --navy-2: #16213a;
      --gold: #ffcc33; --gold-ink: #1c1400; --orange: #ff8f4d;
      --line: rgba(242,243,247,0.14);
      --shadow: 0 20px 44px -18px rgba(0,0,0,0.6);
    }
  }
  :root[data-theme="dark"] {
    --bg: #0b0f1a; --surface: #131a2b; --surface-tint: #182238;
    --text: #f2f3f7; --text-muted: #a7adc0;
    --navy: #0a1220; --navy-2: #16213a;
    --gold: #ffcc33; --gold-ink: #1c1400; --orange: #ff8f4d;
    --line: rgba(242,243,247,0.14);
    --shadow: 0 20px 44px -18px rgba(0,0,0,0.6);
  }
  :root[data-theme="light"] {
    --bg: #f7f5ef; --surface: #ffffff; --surface-tint: #edf0f8;
    --text: #10162b; --text-muted: #565f78;
    --navy: #0f1f3d; --navy-2: #16294d;
    --gold: #f4b400; --gold-ink: #241a00; --orange: #ff7a29;
    --line: rgba(16,22,43,0.12);
    --shadow: 0 20px 44px -22px rgba(15,31,61,0.35);
  }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-body); line-height: 1.6; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 0 20px; }
  a { color: inherit; }

  .site-nav { background: var(--navy); padding: 14px 0; position: sticky; top: 0; z-index: 50; }
  .site-nav .wrap { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .site-nav .brand { color: #fff; font-weight: 800; font-size: 16px; text-decoration: none; }
  .site-nav .brand span { color: var(--gold); font-weight: 600; }
  .site-nav .nav-cta { background: var(--gold); color: var(--gold-ink); font-weight: 800; font-size: 13.5px; padding: 9px 18px; border-radius: 999px; text-decoration: none; white-space: nowrap; }

  .hero { padding: 44px 0 28px; text-align: center; }
  .hero h1 { font-size: clamp(1.6rem, 4vw, 2.3rem); margin: 0 0 12px; }
  .hero p { color: var(--text-muted); font-size: 15.5px; max-width: 56ch; margin: 0 auto; }
  .hero .updated-note { margin-top: 14px; font-size: 12.5px; color: var(--text-muted); }
  .hero .updated-note b { color: var(--text); }

  .toolbar {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px 16px; margin: 20px 0; box-shadow: var(--shadow);
  }
  .toolbar select, .toolbar input {
    border: 1px solid var(--line); background: var(--bg); color: var(--text);
    border-radius: 8px; padding: 9px 12px; font-size: 13.5px; font-family: inherit;
  }
  .toolbar input[type="search"] { flex: 1; min-width: 160px; }
  .toolbar .count-pill {
    margin-left: auto; font-size: 12.5px; font-weight: 700; color: var(--gold-ink);
    background: var(--gold); padding: 6px 12px; border-radius: 999px; white-space: nowrap;
  }

  .job-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 60px; }
  .job-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
    padding: 18px 20px; display: flex; justify-content: space-between; gap: 16px;
    align-items: flex-start; flex-wrap: wrap; text-decoration: none; color: inherit;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .job-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .job-card .main { flex: 1; min-width: 220px; }
  .job-card .cat-badge {
    display: inline-block; font-size: 11.5px; font-weight: 800; color: var(--gold-ink);
    background: var(--gold); padding: 3px 10px; border-radius: 999px; margin-bottom: 8px;
  }
  .job-card h3 { margin: 0 0 6px; font-size: 15.5px; line-height: 1.4; }
  .job-card .meta { font-size: 12.5px; color: var(--text-muted); }
  .job-card .dday {
    flex-shrink: 0; text-align: center; min-width: 76px; padding: 8px 10px;
    border-radius: 10px; background: var(--surface-tint); font-weight: 800; font-size: 13px;
  }
  .job-card .dday.urgent { background: rgba(255,122,41,0.18); color: var(--orange); }
  .job-card .dday small { display: block; font-weight: 600; font-size: 10.5px; color: var(--text-muted); margin-top: 2px; }

  .empty-state, .loading-state { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px; }

  .cta-banner {
    background: linear-gradient(135deg, var(--navy), var(--navy-2)); color: #fff; border-radius: 16px;
    padding: 28px 26px; text-align: center; margin: 30px 0 50px;
  }
  .cta-banner h3 { margin: 0 0 8px; font-size: 18px; }
  .cta-banner p { color: rgba(255,255,255,.75); font-size: 13.5px; margin: 0 0 16px; }
  .cta-banner a {
    display: inline-block; background: var(--gold); color: var(--gold-ink); font-weight: 800;
    font-size: 13.5px; padding: 10px 22px; border-radius: 999px; text-decoration: none;
  }

  footer { text-align: center; padding: 30px 20px; color: var(--text-muted); font-size: 12.5px; border-top: 1px solid var(--line); }

  @media (max-width: 640px) {
    .toolbar { flex-direction: column; align-items: stretch; }
    .toolbar .count-pill { margin-left: 0; align-self: flex-start; }
    .job-card { flex-direction: row; }
  }
</style>
</head>
<body>

<nav class="site-nav">
  <div class="wrap">
    <a class="brand" href="/">스마트미디어아트센터 <span>· SMAC</span></a>
    <a class="nav-cta" href="https://www.smacedu.kr/photo-artist-instructor">강의 보러가기</a>
  </div>
</nav>

<main class="wrap">
  <div class="hero">
    <h1>평생교육·공공기관 강사모집 공고 모음</h1>
    <p>전국 평생학습관·복지관·문화센터·주민센터의 강사모집 공고를 매일 자동으로 모읍니다. 마감이 지난 공고는 자동으로 걸러드려요.</p>
    <div class="updated-note" id="updated-note"></div>
  </div>

  <div class="toolbar">
    <select id="filter-category">
      <option value="">전체 분야</option>
    </select>
    <select id="filter-sort">
      <option value="deadline">마감임박순</option>
      <option value="recent">최신등록순</option>
    </select>
    <input type="search" id="filter-search" placeholder="제목/기관명 검색">
    <span class="count-pill" id="count-pill">0건</span>
  </div>

  <div id="job-list" class="job-list">
    <div class="loading-state">불러오는 중…</div>
  </div>

  <div class="cta-banner">
    <h3>사진·영상 강의를 직접 준비하고 계신가요?</h3>
    <p>스마트미디어아트센터의 스마트폰 사진강사 양성과정 — 자격증을 직접 발급하는 강사로 성장합니다.</p>
    <a href="https://www.smacedu.kr/photo-artist-instructor">과정 알아보기 →</a>
  </div>
</main>

<footer>
  <div>스마트미디어아트센터 · 매일 자동 수집되는 공개 정보이며, 정확한 내용은 원문 공고를 꼭 확인하세요.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script>
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let allJobs = [];

  function dDayInfo(deadline) {
    if (!deadline) return { text: '상시', urgent: false };
    const today = new Date(); today.setHours(0,0,0,0);
    const dl = new Date(deadline + 'T00:00:00');
    const diff = Math.round((dl - today) / 86400000);
    if (diff < 0) return { text: '마감', urgent: false };
    if (diff === 0) return { text: 'D-Day', urgent: true };
    return { text: `D-${diff}`, urgent: diff <= 3 };
  }

  function render() {
    const cat = document.getElementById('filter-category').value;
    const sort = document.getElementById('filter-sort').value;
    const q = document.getElementById('filter-search').value.trim().toLowerCase();

    let list = allJobs.filter(j => {
      if (cat && j.category !== cat) return false;
      if (q && !(j.title || '').toLowerCase().includes(q) && !(j.institution || '').toLowerCase().includes(q)) return false;
      return true;
    });

    if (sort === 'deadline') {
      list.sort((a, b) => {
        if (!a.deadline && !b.deadline) return new Date(b.collected_at) - new Date(a.collected_at);
        if (!a.deadline) return 1;
        if (!b.deadline) return -1;
        return a.deadline.localeCompare(b.deadline);
      });
    } else {
      list.sort((a, b) => new Date(b.collected_at) - new Date(a.collected_at));
    }

    document.getElementById('count-pill').textContent = `${list.length}건`;

    const listEl = document.getElementById('job-list');
    if (list.length === 0) {
      listEl.innerHTML = '<div class="empty-state">조건에 맞는 공고가 없습니다.</div>';
      return;
    }

    listEl.innerHTML = list.map(j => {
      const dd = dDayInfo(j.deadline);
      return `<a class="job-card" href="${j.url}" target="_blank" rel="noopener">
        <div class="main">
          <span class="cat-badge">${escapeHtml(j.category || '기타')}</span>
          <h3>${escapeHtml(j.title)}</h3>
          <div class="meta">${escapeHtml(j.institution || '')}${j.institution ? ' · ' : ''}수집일 ${escapeHtml((j.collected_at || '').slice(0, 10))}</div>
        </div>
        <div class="dday ${dd.urgent ? 'urgent' : ''}">${dd.text}<small>${j.deadline ? escapeHtml(j.deadline) : '마감일 미상'}</small></div>
      </a>`;
    }).join('');
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  async function init() {
    const { data, error } = await sb
      .from('lecturer_jobs')
      .select('title,url,institution,category,deadline,collected_at')
      .eq('status', 'active')
      .order('deadline', { ascending: true, nullsFirst: false });

    if (error) {
      document.getElementById('job-list').innerHTML = '<div class="empty-state">공고를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.</div>';
      console.error(error);
      return;
    }

    allJobs = data || [];

    const categories = [...new Set(allJobs.map(j => j.category).filter(Boolean))].sort();
    const catSelect = document.getElementById('filter-category');
    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      catSelect.appendChild(opt);
    });

    const latest = allJobs.reduce((max, j) => j.collected_at > max ? j.collected_at : max, '');
    document.getElementById('updated-note').innerHTML = latest
      ? `마지막 업데이트: <b>${latest.slice(0, 10)}</b> · 총 <b>${allJobs.length}</b>건 게시 중`
      : '';

    render();
  }

  document.getElementById('filter-category').addEventListener('change', render);
  document.getElementById('filter-sort').addEventListener('change', render);
  document.getElementById('filter-search').addEventListener('input', render);

  init();
</script>
</body>
</html>
