<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유튜브 채널 기획 워크북 | SMAC EDU</title>
<meta name="description" content="오래가는 유튜브 채널을 위한 8단계 기획 워크북. 8개의 질문에 답하면 나만의 채널 기획서가 완성됩니다.">
<meta property="og:title" content="유튜브 채널 기획 워크북 | SMAC EDU">
<meta property="og:description" content="영상 제작보다 먼저! 8단계 질문으로 완성하는 나만의 채널 기획서">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://developers.kakao.com/sdk/js/kakao.js"></script>
<style>
  :root{
    --paper:#FBFAF6; --ink:#17213B; --muted:#6E7280; --line:#E3E1D8;
    --red:#E62117; --red-dark:#B71C12; --hl:#FFE45E; --card:#FFFFFF;
    --kakao:#FEE500; --kakao-ink:#191919;
  }
  *{box-sizing:border-box;}
  body{margin:0; min-height:100vh; background:var(--paper); color:var(--ink);
    font-family:'Noto Sans KR',sans-serif; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:960px; margin:0 auto; padding:28px 20px 64px;}
  .eyebrow{font-size:11px; font-weight:700; letter-spacing:.22em; color:var(--red); text-transform:uppercase;}
  h1{font-family:'Gowun Batang',serif; font-weight:700; font-size:clamp(26px,4.5vw,40px); line-height:1.25; margin:10px 0 6px;}
  .sub{color:var(--muted); font-size:15px; line-height:1.7; max-width:560px; margin:0;}
  .brand{font-size:12px; font-weight:700; color:var(--muted); letter-spacing:.08em; margin-bottom:6px;}
  .brand b{color:var(--red);}

  .player{margin:26px 0 8px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 18px; box-shadow:0 1px 0 rgba(23,33,59,.04);}
  .player-top{display:flex; justify-content:space-between; align-items:baseline; font-size:12.5px; color:var(--muted); margin-bottom:10px;}
  .player-top b{color:var(--ink); font-weight:700;}
  .track{position:relative; height:6px; border-radius:99px; background:var(--line);}
  .fill{position:absolute; top:0; bottom:0; left:0; width:0%; border-radius:99px; background:var(--red); transition:width .45s cubic-bezier(.2,.8,.2,1);}
  .knob{position:absolute; top:50%; left:0%; transform:translate(-50%,-50%); width:14px; height:14px; border-radius:50%; background:var(--red); box-shadow:0 0 0 4px rgba(230,33,23,.15); transition:left .45s cubic-bezier(.2,.8,.2,1);}
  .chapters{display:flex; gap:4px; margin-top:12px;}
  .chap{flex:1; height:26px; border-radius:6px; border:1px solid var(--line); background:#F3F2EC; font-size:11px; font-weight:700; color:var(--muted); cursor:pointer; transition:all .18s; display:flex; align-items:center; justify-content:center; font-family:inherit;}
  .chap:hover{border-color:var(--ink); color:var(--ink);}
  .chap.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  .chap.done{background:var(--red); border-color:var(--red); color:#fff;}

  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:28px clamp(20px,4vw,36px); margin-top:18px; box-shadow:0 1px 0 rgba(23,33,59,.04);}
  .qnum{font-family:'Gowun Batang',serif; font-size:15px; color:var(--red); font-weight:700; letter-spacing:.06em;}
  .q{font-family:'Gowun Batang',serif; font-size:clamp(20px,3.4vw,27px); font-weight:700; line-height:1.4; margin:8px 0 12px;}
  .desc{font-size:14.5px; line-height:1.8; color:#3B4258;}
  .example{margin:18px 0 6px; padding:13px 16px; border-left:3px solid var(--hl); background:linear-gradient(90deg, rgba(255,228,94,.28), rgba(255,228,94,.06)); border-radius:0 10px 10px 0; font-size:13.5px; line-height:1.75; color:#4A4426;}
  .field{margin-top:18px;}
  .label{display:block; font-size:13px; font-weight:700; margin-bottom:7px;}
  textarea.input{width:100%; border:1.5px solid var(--line); border-radius:10px; background:#FDFDFB; padding:12px 14px; font-size:14.5px; font-family:inherit; color:var(--ink); line-height:1.6; resize:vertical; min-height:52px; transition:border-color .15s, box-shadow .15s;}
  textarea.input:focus{outline:none; border-color:var(--ink); box-shadow:0 0 0 3px rgba(23,33,59,.08);}
  textarea.input::placeholder{color:#A9ACB8;}

  .nav{display:flex; justify-content:space-between; gap:10px; margin-top:26px; flex-wrap:wrap;}
  .btn{border:none; cursor:pointer; font-family:inherit; font-weight:700; font-size:14.5px; border-radius:10px; padding:12px 22px; transition:transform .12s, background .15s;}
  .btn:active{transform:scale(.97);}
  .btn:focus-visible{outline:3px solid rgba(230,33,23,.4); outline-offset:2px;}
  .primary{background:var(--red); color:#fff; box-shadow:0 2px 8px rgba(230,33,23,.25);}
  .primary:hover{background:var(--red-dark);}
  .ghost{background:transparent; color:var(--muted); border:1.5px solid var(--line);}
  .ghost:hover{color:var(--ink); border-color:var(--ink);}
  .ink{background:var(--ink); color:#fff;}
  .ink:hover{background:#0E1730;}
  .kakao-btn{background:var(--kakao); color:var(--kakao-ink); display:inline-flex; align-items:center; gap:8px;}
  .kakao-btn:hover{background:#F5DC00;}

  .intro-list{margin:24px 0 4px; display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:10px;}
  .intro-item{border:1px solid var(--line); background:var(--card); border-radius:12px; padding:14px 15px; font-size:13.5px; font-weight:500; display:flex; gap:10px; align-items:flex-start; line-height:1.5;}
  .intro-item span{font-family:'Gowun Batang',serif; font-weight:700; color:var(--red); font-size:15px;}

  .sum-step{border-bottom:1px dashed var(--line); padding:18px 0;}
  .sum-step:last-child{border-bottom:none;}
  .sum-title{font-family:'Gowun Batang',serif; font-weight:700; font-size:17px; margin-bottom:10px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .badge{font-family:'Noto Sans KR'; font-size:10.5px; font-weight:700; padding:3px 8px; border-radius:99px; letter-spacing:.05em;}
  .badge.ok{background:rgba(230,33,23,.1); color:var(--red);}
  .badge.no{background:#F0EFE9; color:var(--muted);}
  .sum-row{font-size:13.5px; line-height:1.8; display:flex; gap:8px;}
  .sum-row .k{color:var(--muted); flex:none; min-width:150px;}
  .sum-row .v{color:var(--ink); font-weight:500; white-space:pre-wrap;}
  .sum-row .v.empty{color:#B9BCC6; font-weight:400;}
  .edit{margin-left:auto; font-size:12px; color:var(--muted); background:none; border:none; cursor:pointer; text-decoration:underline; font-family:inherit;}
  .edit:hover{color:var(--red);}

  .cta-box{margin-top:26px; border:2px solid var(--ink); border-radius:14px; padding:22px 24px; background:linear-gradient(135deg,#FFFDF2,#FFF);}
  .cta-box h3{font-family:'Gowun Batang',serif; font-size:19px; margin:0 0 8px;}
  .cta-box p{font-size:13.5px; line-height:1.75; color:#3B4258; margin:0 0 16px;}
  .cta-actions{display:flex; gap:10px; flex-wrap:wrap;}

  .lead-box{margin-top:26px; border:2px solid var(--red); border-radius:14px; padding:22px 24px; background:linear-gradient(135deg,#FFF6F5,#FFF);}
  .lead-box h3{font-family:'Gowun Batang',serif; font-size:19px; margin:0 0 8px;}
  .lead-box p{font-size:13.5px; line-height:1.75; color:#3B4258; margin:0 0 18px;}
  .lead-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .lead-field{display:flex; flex-direction:column;}
  .lead-field label{font-size:12.5px; font-weight:700; margin-bottom:6px;}
  .lead-field input{border:1.5px solid var(--line); border-radius:10px; background:#FDFDFB; padding:11px 13px; font-size:14.5px; font-family:inherit; color:var(--ink); transition:border-color .15s, box-shadow .15s;}
  .lead-field input:focus{outline:none; border-color:var(--red); box-shadow:0 0 0 3px rgba(230,33,23,.1);}
  .lead-field input::placeholder{color:#A9ACB8;}
  .lead-field.err input{border-color:var(--red);}
  .field-err{font-size:11.5px; color:var(--red); margin-top:5px; min-height:14px;}
  .consent-row{display:flex; align-items:flex-start; gap:9px; margin-top:16px; font-size:12.5px; color:#3B4258; line-height:1.6;}
  .consent-row input{margin-top:3px; width:16px; height:16px; accent-color:var(--red); flex:none;}
  .consent-row label{cursor:pointer;}
  .lead-submit-row{margin-top:18px;}
  .lead-submit-row .btn{width:100%;}
  .lead-note{font-size:11.5px; color:var(--muted); margin-top:10px; line-height:1.6;}

  .unlocked-box{margin-top:26px; border:2px solid var(--red); border-radius:14px; padding:22px 24px; background:linear-gradient(135deg,#FFFDF2,#FFF);}
  .unlocked-box h3{font-family:'Gowun Batang',serif; font-size:19px; margin:0 0 8px;}
  .unlocked-box p{font-size:13.5px; line-height:1.75; color:#3B4258; margin:0 0 16px;}
  .unlocked-actions{display:flex; gap:10px; flex-wrap:wrap;}

  @media (max-width:520px){
    .lead-grid{grid-template-columns:1fr;}
  }

  .hidden{display:none;}
  footer{margin-top:36px; text-align:center; font-size:12px; color:var(--muted);}
  footer a{color:var(--red); font-weight:700; text-decoration:none;}

  @media (max-width:640px){
    .chap{font-size:10px; height:22px;}
    .sum-row{flex-direction:column; gap:2px;}
    .sum-row .k{min-width:auto;}
  }
  @media (prefers-reduced-motion:reduce){
    .fill,.knob,.btn{transition:none;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><b>SMAC EDU</b> · 스마트폰 & AI 콘텐츠 교육</div>
  <div class="eyebrow">오래가는 채널을 위한 8단계</div>
  <h1>유튜브 채널 기획 워크북</h1>
  <p class="sub">영상 제작 기술보다 먼저 정해야 할 것들. 8개의 질문에 답하면 나만의 채널 기획서가 완성됩니다.</p>

  <div class="player" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progressbar" aria-label="기획 진행률">
    <div class="player-top">
      <span>▶ 기획 진행률 <b id="pct">0%</b></span>
      <span>완료 단계 <b id="doneCount">0</b> / 8</span>
    </div>
    <div class="track"><div class="fill" id="fill"></div><div class="knob" id="knob"></div></div>
    <div class="chapters" id="chapters"></div>
  </div>

  <div id="view"></div>

  <footer>© SMAC EDU · <a href="https://smacedu.kr" target="_blank" rel="noopener">smacedu.kr</a></footer>
</div>

<script>
/* ══════════════════════════════════════════════
   ★ 설정 — 이 부분만 수정하면 됩니다 ★
   ══════════════════════════════════════════════ */
const CONFIG = {
  // 카카오톡 채널 추가 링크 (/friend = 추가 화면 바로 열기)
  kakaoChannelUrl: "http://pf.kakao.com/_aEIMC/friend",
  // 강의 신청 구글폼 또는 랜딩페이지 링크
  courseUrl: "https://smacedu.kr/photo-artist-instructor",
  // CTA 문구
  ctaTitle: "기획서를 완성하셨네요! 이제 '제작'을 배울 차례입니다",
  ctaDesc: "SMAC EDU 카카오톡 채널을 추가하시면 AI 영상 제작 가이드와 무료 자료를 보내드립니다.",

  // ─ 리드 수집 (이미 인증된 photo-lecture-apps-script.gs 웹앱 재사용 — 새 구글폼·새 인증 불필요) ─
  // scriptUrl은 그 스크립트의 배포 웹앱 주소이며, 스크립트를 "새 버전"으로 재배포해도 이 주소는 그대로 유지됨.
  // .gs 파일의 form=ytworkbook 분기가 이 요청을 받아 시트에 기록함.
  leadLog: {
    scriptUrl: "https://script.google.com/macros/s/AKfycbz47FQesvuy7rBzB_VYye85Vj6cjDpstFYTVvdNnDdjsNyb_HgD4DQM-vi6udtSZApa/exec"
  },

  // ─ 카카오톡 공유 (필수: jsKey를 채워야 공유 버튼이 작동함) ─
  // 1) developers.kakao.com → 앱 생성 → 앱 키 중 JavaScript 키 복사
  // 2) 앱 설정 > 플랫폼 > Web 플랫폼에 실제 배포 도메인 등록 (예: smacedu.kr)
  //    → 등록 안 하면 해당 도메인이 아닌 곳(로컬 등)에서 공유가 차단됨
  kakaoShare: {
    jsKey: "",      // 카카오 디벨로퍼스 앱의 JavaScript 키
    shareUrl: "https://smacedu.kr/youtube-planner.html"  // 실제 배포 주소로 교체
  }
};

const STEPS = [
  { id:"why", num:1, title:"채널의 존재 이유", eyebrow:"WHY",
    question:"이 채널이 없어지면 아쉬워할 사람은 누구인가요?",
    desc:"\u201C무엇을 알려주는 채널\u201D이 아니라 \u201C시청자의 어떤 문제를 해결해주는 채널\u201D로 정의하세요. 존재 이유가 뾰족할수록 채널은 오래갑니다.",
    example:"\u201CAI 영상 튜토리얼 채널\u201D (X) → \u201C돈 없이 혼자 콘텐츠를 만들고 싶은 1인 창작자를 위한 채널\u201D (O)",
    fields:[
      { key:"why_who", label:"내 채널이 없어지면 아쉬워할 사람", ph:"예: AI 도구가 낯설지만 배우고 싶은 50대 자영업자" },
      { key:"why_problem", label:"그 사람이 겪고 있는 문제/욕구", ph:"예: 영상을 만들고 싶은데 어디서부터 시작할지 모른다" },
      { key:"why_one", label:"존재 이유 한 문장", ph:"예: ___한 사람이 ___할 수 있게 돕는 채널" } ] },
  { id:"persona", num:2, title:"타겟 시청자 페르소나", eyebrow:"WHO",
    question:"단 한 명의 시청자를 그려본다면 누구인가요?",
    desc:"나이, 상황, 지금 겪는 어려움, 영상을 본 뒤 원하는 결과까지 구체적으로. 페르소나가 뾰족할수록 콘텐츠 방향이 흔들리지 않습니다.",
    example:"\u201C58세 김영순 님. 은퇴 후 스마트폰 사진에 재미를 붙였고, 이제 AI로 영상까지 만들어 손주에게 자랑하고 싶다.\u201D",
    fields:[
      { key:"persona_basic", label:"나이 / 상황", ph:"예: 55세, 은퇴 준비 중, 유튜브는 보기만 하는 사람" },
      { key:"persona_pain", label:"지금 겪는 어려움", ph:"예: 용어가 어렵고, 어떤 도구를 써야 할지 모름" },
      { key:"persona_gain", label:"내 영상을 보고 얻고 싶은 결과", ph:"예: 내 손으로 1분짜리 영상 하나를 완성하는 것" } ] },
  { id:"position", num:3, title:"포지셔닝 & 차별화", eyebrow:"EDGE",
    question:"비슷한 채널들이 안 하는 것, 못 하는 것은 무엇인가요?",
    desc:"유사 채널 3~5개를 분석하고, 나만의 각도(관점·톤·전문성·캐릭터)를 한 문장으로 정의하세요. 이 문장이 썸네일·제목·오프닝의 기준이 됩니다.",
    example:"\u201C젊은 유튜버들이 빠르게 넘어가는 부분을, 중장년 눈높이에서 화면 하나하나 짚어주는 채널\u201D",
    fields:[
      { key:"pos_rivals", label:"참고한 유사 채널 (3~5개)", ph:"예: A채널, B채널, C채널" },
      { key:"pos_gap", label:"그들이 안 하는 것 / 못 하는 것", ph:"예: 왕초보 속도에 맞춘 따라하기, 실패 사례 공유" },
      { key:"pos_one", label:"나만의 각도 한 문장", ph:"예: ___만큼은 내가 제일 친절하게/깊게/재밌게 다룬다" } ] },
  { id:"pillars", num:4, title:"콘텐츠 필러 설계", eyebrow:"PILLARS",
    question:"채널을 지탱할 3~5개의 주제 축은 무엇인가요?",
    desc:"필러(기둥)가 있어야 \u201C오늘 뭐 찍지\u201D 고민 없이 아이디어가 계속 나옵니다. 반복 가능한 카테고리로 설계하세요.",
    example:"① 도구 튜토리얼 ② AI 트렌드 해설 ③ 수강생 Before/After ④ Q&A 고민 상담",
    fields:[
      { key:"pillar1", label:"필러 1", ph:"예: 왕초보 튜토리얼" },
      { key:"pillar2", label:"필러 2", ph:"예: 최신 AI 도구 리뷰" },
      { key:"pillar3", label:"필러 3 (+ 추가 필러)", ph:"예: 실전 제작 과정 공개, Q&A" } ] },
  { id:"format", num:5, title:"포맷 & 시리즈 설계", eyebrow:"FORMAT",
    question:"매번 새로 기획하지 않아도 되는 '틀'이 있나요?",
    desc:"고정 구조(훅 → 문제 제기 → 해결 → 결과 → CTA)와 시리즈명을 정하면 제작이 쉬워지고, 시청자는 다음 편을 기다리게 됩니다.",
    example:"시리즈명 \u201C왕초보 AI영상 챌린지\u201D — 오프닝 3초 훅 → 오늘의 목표 → 따라하기 → 완성본 공개 → 다음 편 예고",
    fields:[
      { key:"fmt_structure", label:"영상 고정 구조", ph:"예: 3초 훅 → 문제 → 해결 과정 → 결과물 → CTA" },
      { key:"fmt_series", label:"시리즈명 아이디어", ph:"예: 5060 AI영상 도전기" },
      { key:"fmt_length", label:"기본 영상 길이 / 형태", ph:"예: 8~10분 롱폼 + 1분 쇼츠 재활용" } ] },
  { id:"cadence", num:6, title:"업로드 주기 & 지속가능성", eyebrow:"RHYTHM",
    question:"1년 뒤에도 지킬 수 있는 주기는 무엇인가요?",
    desc:"의욕적인 \u201C주 3회\u201D보다 확실히 지키는 \u201C주 1회\u201D가 장기적으로 강합니다. 배치 제작과 요일별 작업 분리로 번아웃을 방지하세요.",
    example:"매주 화요일 업로드 / 격주 토요일에 2편씩 촬영 / 기획은 월요일, 편집은 목요일",
    fields:[
      { key:"cad_freq", label:"업로드 주기 & 요일", ph:"예: 주 1회, 매주 화요일 오전 9시" },
      { key:"cad_batch", label:"배치 제작 계획", ph:"예: 한 번에 3편 스토리보드 작성, 격주 촬영" },
      { key:"cad_split", label:"기획/제작/편집 요일 배정", ph:"예: 월-기획, 수-제작, 금-편집" } ] },
  { id:"relation", num:7, title:"시청자와의 관계 설계", eyebrow:"FANS",
    question:"구독자가 아니라 '찐팬'을 만드는 장치는 무엇인가요?",
    desc:"댓글 유도 질문, 커뮤니티 탭, 다음 영상 예고로 관계를 만드세요. 초반엔 조회수보다 찐팬 100명이 채널을 끌고 가는 힘입니다.",
    example:"매 영상 끝에 \u201C여러분의 첫 AI 영상 주제는 뭔가요?\u201D 질문 → 댓글 아이디어를 다음 영상에서 직접 만들어줌",
    fields:[
      { key:"rel_question", label:"댓글 유도 장치", ph:"예: 영상마다 하나의 질문 던지기" },
      { key:"rel_channel", label:"소통 채널", ph:"예: 커뮤니티 탭 + 카카오 오픈채팅 연계" },
      { key:"rel_reward", label:"찐팬 보상 장치", ph:"예: 댓글 아이디어 채택, 구독자 작품 소개 코너" } ] },
  { id:"metrics", num:8, title:"성장 지표 & 피드백 루프", eyebrow:"LOOP",
    question:"무엇을 보고 방향을 조정할 건가요?",
    desc:"초기 3개월은 조회수보다 시청 지속률과 주제별 반응을 관찰하세요. 가설 → 실행 → 관찰 → 조정의 루프로 접근합니다.",
    example:"월 1회 점검: 지속률 상위 3편의 공통점 찾기 → 반응 좋은 필러에 집중, 없는 필러는 정리",
    fields:[
      { key:"met_kpi", label:"초기 3개월 핵심 지표", ph:"예: 평균 시청 지속률 40% 이상" },
      { key:"met_review", label:"점검 주기 & 방법", ph:"예: 매월 마지막 주 일요일, 스튜디오 분석 리뷰" },
      { key:"met_rule", label:"조정 원칙", ph:"예: 3편 연속 반응 없는 필러는 형식을 바꾸거나 중단" } ] }
];

const TOTAL_FIELDS = STEPS.reduce((n,s)=>n+s.fields.length,0);
let state = { view:"intro", cur:0, answers:{}, lead:{name:"",phone:"",consent:false}, leadSubmitted:false, submitting:false, leadErrors:{} };

/* 새로고침 대비 세션 내 임시 저장 */
try {
  const saved = sessionStorage.getItem("smac_planner");
  if (saved) state.answers = JSON.parse(saved);
  const savedLead = sessionStorage.getItem("smac_planner_lead");
  if (savedLead) {
    const l = JSON.parse(savedLead);
    state.lead = l.lead || state.lead;
    state.leadSubmitted = !!l.leadSubmitted;
  }
} catch(e){}

/* 카카오 SDK 초기화 (jsKey가 설정된 경우에만) */
try {
  if (CONFIG.kakaoShare.jsKey && window.Kakao && !Kakao.isInitialized()) {
    Kakao.init(CONFIG.kakaoShare.jsKey);
  }
} catch(e){}

const esc = s => (s||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const val = k => (state.answers[k]||"").trim();
const stepDone = s => s.fields.every(f => val(f.key));
const stepTouched = s => s.fields.some(f => val(f.key));

function persist(){
  try { sessionStorage.setItem("smac_planner", JSON.stringify(state.answers)); } catch(e){}
}

function persistLead(){
  try { sessionStorage.setItem("smac_planner_lead", JSON.stringify({lead:state.lead, leadSubmitted:state.leadSubmitted})); } catch(e){}
}

function normalizePhone(v){
  const digits = (v||"").replace(/[^0-9]/g,"");
  if (digits.length === 10) return digits.replace(/(\d{3})(\d{3})(\d{4})/,"$1-$2-$3");
  if (digits.length === 11) return digits.replace(/(\d{3})(\d{4})(\d{4})/,"$1-$2-$3");
  return v.trim();
}
function isValidPhone(v){
  return /^01[0-9]-\d{3,4}-\d{4}$/.test(normalizePhone(v));
}

/* 리드(이름/전화번호/기획서 전문)를 Apps Script 웹앱으로 전송. CONFIG.leadLog.scriptUrl이 비어 있으면 건너뜀 */
function submitLead(name, phone){
  const g = CONFIG.leadLog;
  if (!g.scriptUrl) {
    console.warn("CONFIG.leadLog.scriptUrl이 설정되지 않아 리드 전송을 건너뜁니다.");
    return Promise.resolve();
  }
  // Apps Script 웹앱은 POST를 내부적으로 302 리다이렉트하면서 body를 날려버리므로,
  // 반드시 GET + URL 파라미터로 보낸다.
  const params = new URLSearchParams({ form: "ytworkbook", name, phone, plan: buildPlan() });
  return fetch(g.scriptUrl + "?" + params, { mode: "no-cors" });
}

function shareToKakao(){
  if (!CONFIG.kakaoShare.jsKey || !window.Kakao || !Kakao.isInitialized()) {
    alert("카카오톡 공유 기능은 준비 중입니다. 잠시 후 다시 시도해주세요.");
    return;
  }
  const link = CONFIG.kakaoShare.shareUrl + (CONFIG.kakaoShare.shareUrl.includes("?") ? "&" : "?") + "ref=kakao_share";
  Kakao.Share.sendDefault({
    objectType: "feed",
    content: {
      title: (state.lead.name ? state.lead.name+"님의 " : "") + "유튜브 채널 기획서가 완성됐어요",
      description: "8단계 질문으로 완성하는 나만의 채널 기획서 — SMAC EDU",
      imageUrl: "https://smacedu.kr/og-image.png",
      link: { mobileWebUrl: link, webUrl: link }
    },
    buttons: [
      { title: "나도 기획서 만들기", link: { mobileWebUrl: link, webUrl: link } }
    ]
  });
}

function renderProgress(){
  const filled = Object.values(state.answers).filter(v=>v&&v.trim()).length;
  const pct = Math.round(filled/TOTAL_FIELDS*100);
  const done = STEPS.filter(stepDone).length;
  document.getElementById("pct").textContent = pct+"%";
  document.getElementById("doneCount").textContent = done;
  document.getElementById("fill").style.width = pct+"%";
  document.getElementById("knob").style.left = pct+"%";
  document.getElementById("progressbar").setAttribute("aria-valuenow", pct);
  const ch = document.getElementById("chapters");
  ch.innerHTML = "";
  STEPS.forEach((st,i)=>{
    const b = document.createElement("button");
    b.className = "chap" + (state.view==="step"&&state.cur===i ? " on" : stepDone(st) ? " done" : "");
    b.textContent = st.num;
    b.title = st.title;
    b.setAttribute("aria-label", st.num+"단계 "+st.title);
    b.onclick = ()=>{ state.cur=i; state.view="step"; render(); };
    ch.appendChild(b);
  });
}

function render(){
  renderProgress();
  const v = document.getElementById("view");
  if (state.view==="intro") v.innerHTML = introHTML();
  else if (state.view==="step") v.innerHTML = stepHTML(STEPS[state.cur]);
  else v.innerHTML = summaryHTML();
  bind();
  window.scrollTo({top:0, behavior:"smooth"});
}

function introHTML(){
  return `<div class="card">
    <div class="qnum">시작하기 전에</div>
    <div class="q">기획이 먼저입니다. 제작은 그 다음이에요.</div>
    <p class="desc">"일단 만들어보기"는 실행력에 좋지만, 기획 없이 시작한 채널은 몇 개 영상 이후 방향을 잃기 쉽습니다. 아래 8단계 질문에 답하며 채널의 뼈대를 세워보세요. 답은 짧아도 괜찮습니다 — 나중에 언제든 고칠 수 있으니까요.</p>
    <div class="intro-list">
      ${STEPS.map(st=>`<div class="intro-item"><span>${String(st.num).padStart(2,"0")}</span>${st.title}</div>`).join("")}
    </div>
    <div class="nav" style="justify-content:flex-end">
      <button class="btn primary" data-act="start">▶ 기획 시작하기</button>
    </div>
  </div>`;
}

function stepHTML(s){
  return `<div class="card">
    <div class="qnum">STEP ${s.num} · ${s.eyebrow}</div>
    <div class="q">${s.question}</div>
    <p class="desc">${s.desc}</p>
    <div class="example"><b>예시</b> — ${s.example}</div>
    ${s.fields.map(f=>`
      <div class="field">
        <label class="label" for="${f.key}">${f.label}</label>
        <textarea class="input" id="${f.key}" rows="2" placeholder="${esc(f.ph)}">${esc(state.answers[f.key]||"")}</textarea>
      </div>`).join("")}
    <div class="nav">
      <button class="btn ghost" data-act="prev">← 이전</button>
      ${state.cur < STEPS.length-1
        ? `<button class="btn primary" data-act="next">다음 단계 →</button>`
        : `<button class="btn ink" data-act="finish">기획서 완성하기 ✓</button>`}
    </div>
  </div>`;
}

function summaryHTML(){
  const done = STEPS.filter(stepDone).length;
  return `<div class="card">
    <div class="qnum">FINAL CUT</div>
    <div class="q">나의 채널 기획서</div>
    <p class="desc">${done===8
      ? "8단계를 모두 완성했습니다. 이제 이 기획서를 기준으로 개별 영상의 주제와 시놉시스를 정하고, 제작 단계로 넘어가세요."
      : `아직 ${8-done}개 단계가 비어 있습니다. 비어 있어도 괜찮지만, 완성도가 높을수록 채널이 흔들리지 않습니다.`}</p>
    <div style="margin-top:10px">
      ${STEPS.map((st,i)=>`
        <div class="sum-step">
          <div class="sum-title">${st.num}. ${st.title}
            <span class="badge ${stepDone(st)?"ok":"no"}">${stepDone(st)?"완료":stepTouched(st)?"작성 중":"미작성"}</span>
            <button class="edit" data-goto="${i}">수정</button>
          </div>
          ${st.fields.map(f=>{
            const v = val(f.key);
            return `<div class="sum-row"><span class="k">${f.label}</span><span class="v${v?"":" empty"}">${v?esc(v):"아직 작성하지 않았어요"}</span></div>`;
          }).join("")}
        </div>`).join("")}
    </div>
    <div class="nav">
      <button class="btn ghost" data-act="back">← 돌아가기</button>
    </div>
    ${state.leadSubmitted ? unlockedBoxHTML() : leadBoxHTML()}
    <div class="cta-box">
      <h3>${CONFIG.ctaTitle}</h3>
      <p>${CONFIG.ctaDesc}</p>
      <div class="cta-actions">
        <a href="${CONFIG.kakaoChannelUrl}" target="_blank" rel="noopener"><button class="btn kakao-btn">💬 카카오톡 채널 추가하기</button></a>
        <a href="${CONFIG.courseUrl}" target="_blank" rel="noopener"><button class="btn ghost">강의 살펴보기 →</button></a>
      </div>
    </div>
  </div>`;
}

function leadBoxHTML(){
  const errs = state.leadErrors || {};
  return `<div class="lead-box">
    <h3>📩 기획서를 저장하시겠어요?</h3>
    <p>이름과 연락처를 남겨주시면 완성된 기획서 전체를 복사하고, 카카오톡으로도 받아보실 수 있어요.</p>
    <div class="lead-grid">
      <div class="lead-field${errs.name?" err":""}">
        <label for="leadName">이름</label>
        <input type="text" id="leadName" placeholder="홍길동" value="${esc(state.lead.name)}" autocomplete="name">
        <div class="field-err">${errs.name||""}</div>
      </div>
      <div class="lead-field${errs.phone?" err":""}">
        <label for="leadPhone">전화번호</label>
        <input type="tel" id="leadPhone" placeholder="010-1234-5678" value="${esc(state.lead.phone)}" autocomplete="tel">
        <div class="field-err">${errs.phone||""}</div>
      </div>
    </div>
    <div class="consent-row">
      <input type="checkbox" id="leadConsent" ${state.lead.consent?"checked":""}>
      <label for="leadConsent">(필수) 입력하신 정보는 기획서 발송 및 강의 안내 목적으로만 사용되며, 원치 않으실 경우 언제든 수신 거부하실 수 있습니다.</label>
    </div>
    ${errs.consent?`<div class="field-err">${errs.consent}</div>`:""}
    <div class="lead-submit-row">
      <button class="btn primary" data-act="submitLead" id="leadSubmitBtn" ${state.submitting?"disabled":""}>${state.submitting?"저장 중...":"기획서 저장하고 계속하기"}</button>
    </div>
    <p class="lead-note">💡 저장 후 기획서 전체 복사와 카카오톡 공유가 열립니다.</p>
  </div>`;
}

function unlockedBoxHTML(){
  return `<div class="unlocked-box">
    <h3>✅ 저장 완료! ${state.lead.name?esc(state.lead.name)+"님, ":""}기획서를 받아가세요</h3>
    <p>아래 버튼으로 기획서 전체를 복사하거나 카카오톡으로 바로 받을 수 있어요.</p>
    <div class="unlocked-actions">
      <button class="btn primary" data-act="copy" id="copyBtn">기획서 전체 복사하기</button>
      <button class="btn kakao-btn" data-act="kakaoShare">💬 카카오톡으로 보내기</button>
    </div>
    <p class="lead-note" style="margin-top:12px">💡 복사한 기획서를 메모장이나 카카오톡 '나에게 보내기'에 붙여넣어 보관하세요.</p>
  </div>`;
}

function buildPlan(){
  let out = "📺 나의 유튜브 채널 기획서 (SMAC EDU 워크북)\n"+"=".repeat(28)+"\n\n";
  STEPS.forEach(s=>{
    out += s.num+". "+s.title+"\n";
    s.fields.forEach(f=>{ out += "  · "+f.label+": "+(val(f.key)||"(미작성)")+"\n"; });
    out += "\n";
  });
  out += "— smacedu.kr";
  return out;
}

function bind(){
  document.querySelectorAll("textarea.input").forEach(t=>{
    t.addEventListener("input", e=>{
      state.answers[e.target.id] = e.target.value;
      persist();
      renderProgress();
    });
  });

  const leadName = document.getElementById("leadName");
  if (leadName) leadName.addEventListener("input", e=>{ state.lead.name = e.target.value; });
  const leadPhone = document.getElementById("leadPhone");
  if (leadPhone) leadPhone.addEventListener("input", e=>{ state.lead.phone = e.target.value; });
  const leadConsent = document.getElementById("leadConsent");
  if (leadConsent) leadConsent.addEventListener("change", e=>{ state.lead.consent = e.target.checked; });

  document.querySelectorAll("[data-act]").forEach(b=>{
    b.onclick = ()=>{
      const a = b.dataset.act;
      if (a==="start"){ state.view="step"; state.cur=0; render(); }
      else if (a==="prev"){ state.cur===0 ? (state.view="intro") : state.cur--; render(); }
      else if (a==="next"){ state.cur++; render(); }
      else if (a==="finish"){ state.view="summary"; render(); }
      else if (a==="back"){ state.view="step"; state.cur=STEPS.length-1; render(); }
      else if (a==="copy"){
        navigator.clipboard.writeText(buildPlan()).then(()=>{
          const btn = document.getElementById("copyBtn");
          btn.textContent = "복사 완료! ✓";
          setTimeout(()=>{ btn.textContent="기획서 전체 복사하기"; }, 2000);
        }).catch(()=>{
          alert("복사가 지원되지 않는 환경입니다. 화면을 캡처해 주세요.");
        });
      }
      else if (a==="submitLead"){
        const name = state.lead.name.trim();
        const phone = state.lead.phone.trim();
        const errs = {};
        if (!name) errs.name = "이름을 입력해주세요.";
        if (!phone) errs.phone = "전화번호를 입력해주세요.";
        else if (!isValidPhone(phone)) errs.phone = "올바른 전화번호 형식이 아니에요. (예: 010-1234-5678)";
        if (!state.lead.consent) errs.consent = "개인정보 수집·이용에 동의해주세요.";
        state.leadErrors = errs;
        if (Object.keys(errs).length) { render(); return; }

        state.lead.phone = normalizePhone(phone);
        state.submitting = true;
        render();
        submitLead(name, state.lead.phone)
          .catch(err=>{ console.warn("리드 전송 실패:", err); })
          .finally(()=>{
            state.submitting = false;
            state.leadSubmitted = true;
            persistLead();
            render();
          });
      }
      else if (a==="kakaoShare"){ shareToKakao(); }
    };
  });
  document.querySelectorAll("[data-goto]").forEach(b=>{
    b.onclick = ()=>{ state.cur = +b.dataset.goto; state.view="step"; render(); };
  });
}

render();
</script>
</body>
</html>
