<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 | 회원 관리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #172554;
            --navy-light: #1e3a8a;
            --orange: #f97316;
            --gray-bg: #f4f6fb;
            --gray-line: #e5e7eb;
            --text-body: #374151;
            --text-sub: #6b7280;
            --green: #16a34a;
            --red: #dc2626;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--gray-bg);
            color: var(--text-body);
            min-height: 100vh;
        }

        /* 로딩/에러 화면 */
        #authScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 16px;
        }
        #authScreen .spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--gray-line);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #authScreen p { color: var(--text-sub); font-size: 0.95rem; }

        /* 메인 레이아웃 */
        #mainContent { display: none; }

        header {
            background: var(--navy);
            color: #fff;
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header .logo { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.3px; }
        header .logo span { color: var(--orange); }
        header .admin-info { font-size: 0.85rem; color: #93c5fd; display: flex; align-items: center; gap: 12px; }
        header .btn-logout {
            background: transparent;
            border: 1px solid #3b82f6;
            color: #93c5fd;
            padding: 5px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.83rem;
            font-family: inherit;
        }
        header .btn-logout:hover { background: rgba(59,130,246,.15); }

        .page-wrap { max-width: 1300px; margin: 0 auto; padding: 36px 24px 60px; }

        h1 { font-size: 1.7rem; color: var(--navy); margin-bottom: 6px; }
        .subtitle { color: var(--text-sub); font-size: 0.95rem; margin-bottom: 28px; }

        /* 통계 카드 */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .stat-card {
            background: #fff;
            border: 1px solid var(--gray-line);
            border-radius: 16px;
            padding: 20px 24px;
        }
        .stat-card .label { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 8px; }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--navy); }
        .stat-card .value.orange { color: var(--orange); }
        .stat-card .value.green { color: var(--green); }

        /* 검색 / 필터 */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .search-wrap { position: relative; flex: 1; min-width: 220px; }
        .search-wrap input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 1px solid var(--gray-line);
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            background: #fff;
            outline: none;
        }
        .search-wrap input:focus { border-color: var(--orange); }
        .search-wrap .icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-sub);
            font-size: 1rem;
            pointer-events: none;
        }
        .filter-select {
            padding: 10px 14px;
            border: 1px solid var(--gray-line);
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            background: #fff;
            cursor: pointer;
            outline: none;
        }
        .btn-refresh {
            padding: 10px 20px;
            background: var(--orange);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-refresh:hover { background: #dc6f10; }
        .btn-refresh:disabled { opacity: .6; cursor: not-allowed; }

        /* 테이블 */
        .table-wrap {
            background: #fff;
            border: 1px solid var(--gray-line);
            border-radius: 16px;
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--gray-line);
            font-size: 0.92rem;
        }
        thead th {
            background: #f8f9fa;
            color: var(--text-sub);
            font-weight: 700;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #fafbff; }

        td .name { font-weight: 500; color: var(--navy); }
        td .email { font-size: 0.88rem; color: var(--text-sub); margin-top: 3px; }
        td .date { color: var(--text-sub); font-size: 0.9rem; white-space: nowrap; }
        td .never { color: #d1d5db; font-size: 0.88rem; }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 700;
            white-space: nowrap;
        }
        .badge.paid { background: #ecfdf5; color: #15803d; }
        .badge.unpaid { background: #f3f4f6; color: #9ca3af; }

        .empty-row td {
            text-align: center;
            padding: 48px;
            color: var(--text-sub);
        }

        .table-footer {
            padding: 14px 20px;
            font-size: 0.88rem;
            color: var(--text-sub);
            border-top: 1px solid var(--gray-line);
        }

        /* 로딩 오버레이 */
        .loading-row td { text-align: center; padding: 48px; }
        .loading-row .mini-spin {
            display: inline-block;
            width: 24px; height: 24px;
            border: 3px solid var(--gray-line);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @media (max-width: 768px) {
            .page-wrap { padding: 24px 16px 48px; }
            th:nth-child(4), td:nth-child(4) { display: none; }
        }
        @media (max-width: 560px) {
            th:nth-child(5), td:nth-child(5) { display: none; }
        }
    </style>
</head>
<body>

<!-- 인증 확인 중 화면 -->
<div id="authScreen">
    <div class="spinner"></div>
    <p id="authMsg">인증 확인 중...</p>
</div>

<!-- 메인 콘텐츠 -->
<div id="mainContent">
    <header>
        <div class="logo">SMAC<span>EDU</span> 관리자</div>
        <div class="admin-info">
            <span id="adminEmailDisplay"></span>
            <button class="btn-logout" id="logoutBtn">로그아웃</button>
        </div>
    </header>

    <div class="page-wrap">
        <h1>회원 관리</h1>
        <p class="subtitle">가입한 전체 회원 목록과 결제 현황을 확인합니다.</p>

        <div class="stats">
            <div class="stat-card">
                <div class="label">전체 회원</div>
                <div class="value" id="statTotal">—</div>
            </div>
            <div class="stat-card">
                <div class="label">결제 완료 회원</div>
                <div class="value green" id="statPaid">—</div>
            </div>
            <div class="stat-card">
                <div class="label">미결제 회원</div>
                <div class="value" id="statUnpaid">—</div>
            </div>
            <div class="stat-card">
                <div class="label">총 결제 금액</div>
                <div class="value orange" id="statRevenue">—</div>
            </div>
        </div>

        <div class="toolbar">
            <div class="search-wrap">
                <span class="icon">🔍</span>
                <input type="text" id="searchInput" placeholder="이름 또는 이메일로 검색...">
            </div>
            <select class="filter-select" id="payFilter">
                <option value="">전체 결제 상태</option>
                <option value="paid">결제 완료</option>
                <option value="unpaid">미결제</option>
            </select>
            <button class="btn-refresh" id="refreshBtn">새로고침</button>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>회원 정보</th>
                        <th>결제 상태</th>
                        <th>가입일</th>
                        <th>마지막 로그인</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr class="loading-row"><td colspan="5"><div class="mini-spin"></div></td></tr>
                </tbody>
            </table>
            <div class="table-footer" id="tableFooter"></div>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script>
(async () => {
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm')
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    const authScreen  = document.getElementById('authScreen')
    const authMsg     = document.getElementById('authMsg')
    const mainContent = document.getElementById('mainContent')

    // ── 세션 확인 ──────────────────────────────────────────
    const { data: { session } } = await client.auth.getSession()

    if (!session) {
        authMsg.textContent = '로그인이 필요합니다. 로그인 페이지로 이동합니다...'
        setTimeout(() => { location.href = 'login.html?redirect=admin-users.html' }, 1500)
        return
    }

    // 서버에서 관리자 여부 확인 (첫 API 호출로 체크)
    let allUsers = []
    const token = session.access_token

    async function fetchUsers() {
        const res = await fetch('/api/admin-users', {
            headers: { Authorization: `Bearer ${token}` }
        })
        if (res.status === 401 || res.status === 403) {
            const data = await res.json()
            authMsg.textContent = data.error || '접근 권한이 없습니다.'
            return null
        }
        if (!res.ok) {
            throw new Error('서버 오류가 발생했습니다.')
        }
        return res.json()
    }

    let result
    try {
        result = await fetchUsers()
    } catch (e) {
        authMsg.textContent = '데이터를 불러오는 중 오류가 발생했습니다: ' + e.message
        return
    }

    if (!result) return  // 권한 없음 메시지 이미 표시됨

    allUsers = result.users || []

    // ── UI 표시 ────────────────────────────────────────────
    authScreen.style.display = 'none'
    mainContent.style.display = 'block'
    document.getElementById('adminEmailDisplay').textContent = session.user.email

    renderTable(allUsers)
    updateStats(allUsers)

    // ── 이벤트 ─────────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', applyFilter)
    document.getElementById('payFilter').addEventListener('change', applyFilter)
    document.getElementById('refreshBtn').addEventListener('click', async () => {
        const btn = document.getElementById('refreshBtn')
        btn.disabled = true
        btn.textContent = '불러오는 중...'
        document.getElementById('userTableBody').innerHTML =
            '<tr class="loading-row"><td colspan="5"><div class="mini-spin"></div></td></tr>'
        try {
            const fresh = await fetchUsers()
            if (fresh) {
                allUsers = fresh.users || []
                applyFilter()
                updateStats(allUsers)
            }
        } catch(e) {
            alert('새로고침 실패: ' + e.message)
        } finally {
            btn.disabled = false
            btn.textContent = '새로고침'
        }
    })
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await client.auth.signOut()
        location.href = 'login.html'
    })

    function applyFilter() {
        const q = document.getElementById('searchInput').value.trim().toLowerCase()
        const pay = document.getElementById('payFilter').value
        const filtered = allUsers.filter(u => {
            const matchSearch = !q ||
                (u.name || '').toLowerCase().includes(q) ||
                (u.email || '').toLowerCase().includes(q)
            const isPaid = u.purchases.length > 0
            const matchPay = !pay ||
                (pay === 'paid' && isPaid) ||
                (pay === 'unpaid' && !isPaid)
            return matchSearch && matchPay
        })
        renderTable(filtered)
    }

    function renderTable(users) {
        const tbody = document.getElementById('userTableBody')
        const footer = document.getElementById('tableFooter')

        if (!users.length) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="5">조건에 맞는 회원이 없습니다.</td></tr>'
            footer.textContent = ''
            return
        }

        tbody.innerHTML = users.map((u, i) => {
            const isPaid = u.purchases.length > 0
            const badge = isPaid
                ? `<span class="badge paid">결제 완료</span>`
                : `<span class="badge unpaid">미결제</span>`
            return `
                <tr>
                    <td style="color:var(--text-sub);font-size:.88rem">${i + 1}</td>
                    <td>
                        <div class="name">${escHtml(u.name || '(이름 없음)')}</div>
                        <div class="email">${escHtml(u.email)}</div>
                    </td>
                    <td>${badge}</td>
                    <td><span class="date">${fmtDate(u.created_at)}</span></td>
                    <td>${u.last_sign_in_at
                        ? `<span class="date">${fmtDate(u.last_sign_in_at)}</span>`
                        : `<span class="never">없음</span>`
                    }</td>
                </tr>`
        }).join('')

        footer.textContent = `총 ${users.length}명 표시 중`
    }

    function updateStats(users) {
        const paid   = users.filter(u => u.purchases.length > 0)
        const unpaid = users.filter(u => u.purchases.length === 0)
        const revenue = paid.reduce((sum, u) =>
            sum + u.purchases.reduce((s, p) => s + (p.amount || 0), 0), 0)

        document.getElementById('statTotal').textContent   = users.length.toLocaleString()
        document.getElementById('statPaid').textContent    = paid.length.toLocaleString()
        document.getElementById('statUnpaid').textContent  = unpaid.length.toLocaleString()
        document.getElementById('statRevenue').textContent = revenue.toLocaleString() + '원'
    }

    function fmtDate(iso) {
        if (!iso) return '—'
        const d = new Date(iso)
        return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`
    }

    function escHtml(s) {
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }
})()
</script>
</body>
</html>
