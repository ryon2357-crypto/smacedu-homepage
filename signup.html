<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 — 스마트미디어아트센터</title>
    <link rel="icon" href="images/logo1.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #172554; --orange: #f97316; --orange-dk: #ea6b0c;
            --orange-lt: #fff7ed; --gray-line: #e5e7eb;
            --text-body: #374151; --text-sub: #6b7280;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #f8f9fa; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 20px;
        }
        .logo-wrap { text-align: center; margin-bottom: 32px; }
        .logo-wrap img { height: 60px; width: auto; }
        .logo-wrap p { font-size: .85rem; color: var(--text-sub); margin-top: 8px; }

        .card {
            background: #fff; border-radius: 20px;
            box-shadow: 0 4px 32px rgba(0,0,0,.08);
            padding: 44px 40px; width: 100%; max-width: 420px;
        }
        .card h1 { font-size: 1.5rem; font-weight: 900; color: var(--navy); margin-bottom: 6px; }
        .card .sub { font-size: .875rem; color: var(--text-sub); margin-bottom: 32px; }

        .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
        .field label { font-size: .85rem; font-weight: 700; color: var(--text-body); }
        .field input {
            padding: 12px 14px; border: 1.5px solid var(--gray-line); border-radius: 10px;
            font-size: .95rem; font-family: inherit; outline: none;
            transition: border-color .2s;
        }
        .field input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(249,115,22,.1); }

        .btn-main {
            width: 100%; padding: 14px; background: var(--orange); color: #fff;
            border: none; border-radius: 10px; font-size: 1rem; font-weight: 700;
            font-family: inherit; cursor: pointer; transition: background .2s;
            margin-top: 6px;
        }
        .btn-main:hover { background: var(--orange-dk); }
        .btn-main:disabled { background: #d1d5db; cursor: not-allowed; }

        .msg { font-size: .85rem; text-align: center; margin-top: 14px; min-height: 20px; }
        .msg.error { color: #ef4444; }
        .msg.success { color: #10b981; }

        .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
        .divider hr { flex: 1; border: none; border-top: 1px solid var(--gray-line); }
        .divider span { font-size: .8rem; color: var(--text-sub); white-space: nowrap; }

        .link-row { text-align: center; font-size: .875rem; color: var(--text-sub); }
        .link-row a { color: var(--orange); font-weight: 700; text-decoration: none; }
        .link-row a:hover { text-decoration: underline; }

        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: .85rem; color: var(--text-sub); text-decoration: none;
            margin-bottom: 24px; transition: color .2s;
        }
        .back-link:hover { color: var(--navy); }

        .notice {
            background: var(--orange-lt); border-radius: 10px;
            padding: 12px 16px; font-size: .82rem; color: var(--text-sub);
            margin-top: 20px; line-height: 1.7;
        }
    </style>
</head>
<body>

<div class="logo-wrap">
    <a href="index.html">
        <img src="images/logo1.png" alt="스마트미디어아트센터">
    </a>
    <p>스마트미디어아트센터</p>
</div>

<div class="card">
    <a href="login.html" class="back-link">← 로그인으로</a>
    <h1>회원가입</h1>
    <p class="sub">강의 다시보기 서비스 이용을 위해 계정을 만들어주세요.</p>

    <form id="signupForm" novalidate>
        <div class="field">
            <label for="name">이름</label>
            <input type="text" id="name" placeholder="홍길동" required>
        </div>
        <div class="field">
            <label for="email">이메일</label>
            <input type="email" id="email" placeholder="example@email.com" required>
        </div>
        <div class="field">
            <label for="password">비밀번호</label>
            <input type="password" id="password" placeholder="8자 이상" required minlength="8">
        </div>
        <div class="field">
            <label for="password2">비밀번호 확인</label>
            <input type="password" id="password2" placeholder="비밀번호 재입력" required>
        </div>
        <button type="submit" class="btn-main" id="submitBtn">회원가입</button>
        <p class="msg" id="msg"></p>
    </form>

    <div class="divider"><hr><span>이미 계정이 있으신가요?</span><hr></div>
    <p class="link-row"><a href="login.html">로그인하기</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script>
    const form = document.getElementById('signupForm')
    const btn  = document.getElementById('submitBtn')
    const msg  = document.getElementById('msg')

    function showMsg(text, type) {
        msg.textContent = text; msg.className = 'msg ' + type
    }

    // 폼 기본 제출 항상 막기
    form.addEventListener('submit', function(e) { e.preventDefault(); })

    // Supabase 라이브러리 로드 확인
    if (typeof window.supabase === 'undefined' || typeof window.supabase.createClient !== 'function') {
        showMsg('서비스 초기화 실패. 페이지를 새로고침해주세요.', 'error')
        btn.disabled = true
    } else {
        let client
        try {
            client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
        } catch(initErr) {
            showMsg('초기화 오류: ' + initErr.message, 'error')
            btn.disabled = true
        }

        if (client) {
            form.addEventListener('submit', async function(e) {
                e.preventDefault()
                const name  = document.getElementById('name').value.trim()
                const email = document.getElementById('email').value.trim()
                const pw    = document.getElementById('password').value
                const pw2   = document.getElementById('password2').value

                if (!name)         { showMsg('이름을 입력해주세요.', 'error'); return }
                if (!email)        { showMsg('이메일을 입력해주세요.', 'error'); return }
                if (!pw)           { showMsg('비밀번호를 입력해주세요.', 'error'); return }
                if (pw.length < 8) { showMsg('비밀번호는 8자 이상이어야 합니다.', 'error'); return }
                if (pw !== pw2)    { showMsg('비밀번호가 일치하지 않습니다.', 'error'); return }

                btn.disabled = true; btn.textContent = '가입 중...'
                showMsg('', '')

                try {
                    const { error } = await client.auth.signUp({
                        email, password: pw,
                        options: { data: { full_name: name } }
                    })

                    if (error) {
                        const map = {
                            'User already registered': '이미 가입된 이메일입니다. 로그인해주세요.',
                            'Password should be at least 6 characters': '비밀번호는 6자 이상이어야 합니다.'
                        }
                        showMsg(map[error.message] || error.message, 'error')
                        btn.disabled = false; btn.textContent = '회원가입'
                    } else {
                        msg.innerHTML = '가입 완료! <a href="login.html" style="color:#10b981;font-weight:700;">로그인하기 →</a>'
                        msg.className = 'msg success'
                        btn.textContent = '가입 완료'
                        setTimeout(function() { location.href = 'login.html' }, 1500)
                    }
                } catch(e) {
                    showMsg('오류: ' + e.message, 'error')
                    btn.disabled = false; btn.textContent = '회원가입'
                }
            })
        }
    }
</script>
</body>
</html>
